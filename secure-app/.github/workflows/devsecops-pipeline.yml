name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  unit-tests:
    name: Unit Test Execution
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secure-app:${{ github.sha }} .

      - name: Save image as artifact
        run: docker save secure-app:${{ github.sha }} -o secure-app.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-app-image
          path: secure-app.tar

  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: container-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-app-image

      - name: Load Docker image
        run: docker load -i secure-app.tar

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-app:${{ github.sha }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  deploy:
    name: Deploy (Demo)
    runs-on: ubuntu-latest
    needs: container-scan
    environment: demo
    steps:
      - name: Simulate deployment
        run: |
          echo "Deploying secure-app:${GITHUB_SHA} to demo environment"
          echo "Deployment successful"
